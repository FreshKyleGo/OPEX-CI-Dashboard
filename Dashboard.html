  <script type="text/babel">
    const { useState, useMemo, useEffect, useRef } = React;

    // Color Palette Constants

    // Universal Timezone-Safe Date Parser
    const parseDateSafe = (val) => {
      if (!val) return null;
      if (typeof val === 'number') {
        const d = new Date(Math.round((val - 25569) * 86400 * 1000));
        return isNaN(d.getTime()) ? null : d;
      }
      const str = String(val).trim();
      if (!str || str === 'null' || str === '#N/A' || str === '0') return null;
      // ISO format: 2026-01-15
      const isoMatch = str.match(/^(\d{4})-(\d{2})-(\d{2})/);
      if (isoMatch) return new Date(parseInt(isoMatch[1],10), parseInt(isoMatch[2],10)-1, parseInt(isoMatch[3],10));
      // US format: 1/15/2026 or 01/15/2026
      const usMatch = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
      if (usMatch) return new Date(parseInt(usMatch[3],10), parseInt(usMatch[1],10)-1, parseInt(usMatch[2],10));
      // Try native parse as fallback
      const parsed = Date.parse(str);
      return isNaN(parsed) ? null : new Date(parsed);
    };

    // Safe Value Accessor
    const safeVal = (row, idx) => {
      if (!row || idx === undefined || idx === -1) return '';
      const val = row[idx];
      return val !== undefined && val !== null ? val : '';
    };

    // Helper to dynamically discover column index by header name in specified column ranges
    const findColIndex = (headers, name, start = 0, end = headers.length) => {
      for (let i = start; i < end; i++) {
        if (headers[i] && String(headers[i]).toLowerCase().trim() === name.toLowerCase().trim()) {
          return i;
        }
      }
      for (let i = start; i < end; i++) {
        if (headers[i] && String(headers[i]).toLowerCase().includes(name.toLowerCase())) {
          return i;
        }
      }
      return -1;
    };

    const cleanName = (name) => {
      if (!name) return '';
      let str = String(name).toLowerCase().trim();
      str = str.replace(/\b(mr|mrs|ms|miss|dr|prof)\.?\b/gi, '');
      str = str.replace(/\./g, ' ');
      str = str.replace(/ß/g, 'ss');
      str = str.replace(/ä/g, 'ae').replace(/ö/g, 'oe').replace(/ü/g, 'ue');
      return str.replace(/\s+/g, ' ').trim();
    };

    const matchNames = (nameA, nameB) => {
      const cleanA = cleanName(nameA);
      const cleanB = cleanName(nameB);
      if (!cleanA || !cleanB) return false;
      if (cleanA === cleanB) return true;
      const aliases = [
        ["debbie benitez", "debbie cumplido"],
        ["andrew clark", "drew clark"]
      ];
      for (const pair of aliases) {
        if ((cleanA === pair[0] && cleanB === pair[1]) || (cleanA === pair[1] && cleanB === pair[0])) {
          return true;
        }
      }
      const tokensA = cleanA.split(' ');
      const tokensB = cleanB.split(' ');
      if (tokensA.length === 0 || tokensB.length === 0) return false;
      const firstA = tokensA[0];
      const firstB = tokensB[0];
      if (firstA !== firstB) return false;
      const othersA = tokensA.slice(1);
      const othersB = tokensB.slice(1);
      if (othersA.length === 0 || othersB.length === 0) return false;
      const expand = (toks) => {
        const result = new Set();
        toks.forEach(t => {
          result.add(t);
          if (t.includes('-')) {
            t.split('-').forEach(p => {
              if (p) result.add(p);
            });
          }
        });
        return result;
      };
      const setA = expand(othersA);
      const setB = expand(othersB);
      for (const item of setA) {
        if (setB.has(item)) {
          return true;
        }
      }
      return false;
    };

    // Component for Regional Refresh Bar
    function RegionalRefreshBar({ view }) {
      const REFRESH_HOURS = 1;
      const [tick, setTick] = useState(0);

      useEffect(() => {
        const timer = setInterval(() => {
          setTick(prev => prev + 1);
        }, 10000);
        return () => clearInterval(timer);
      }, []);

      const now = new Date();
      const isMonthly = view === 'headcount' || view === 'training';
      const flooredUTCHours = Math.floor(now.getUTCHours() / REFRESH_HOURS) * REFRESH_HOURS;
      const lastSyncUTC = isMonthly
        ? new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), 1, 0, 0, 0, 0))
        : new Date(Date.UTC(
            now.getUTCFullYear(),
            now.getUTCMonth(),
            now.getUTCDate(),
            flooredUTCHours,
            0,
            0,
            0
          ));

      const msElapsed = now.getTime() - lastSyncUTC.getTime();
      const hoursAgo = Math.floor(msElapsed / (1000 * 60 * 60));
      const minutesAgo = Math.floor((msElapsed % (1000 * 60 * 60)) / (1000 * 60));

      const nextSyncUTC = isMonthly
        ? new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth() + 1, 1, 0, 0, 0, 0))
        : new Date(lastSyncUTC.getTime() + REFRESH_HOURS * 60 * 60 * 1000);
      const msToNext = nextSyncUTC.getTime() - now.getTime();
      const hoursToNext = Math.floor(msToNext / (1000 * 60 * 60));
      const minutesToNext = Math.floor((msToNext % (1000 * 60 * 60)) / (1000 * 60));

      const formatTZ = (date, timeZone) => {
        return date.toLocaleString('en-US', {
          timeZone,
          ...(isMonthly ? { month: 'short', day: 'numeric' } : {}),
          hour: '2-digit',
          minute: '2-digit',
          hour12: false
        });
      };

      const berlinTime = formatTZ(lastSyncUTC, 'Europe/Berlin');
      const sydneyTime = formatTZ(lastSyncUTC, 'Australia/Sydney');
      const nyTime = formatTZ(lastSyncUTC, 'America/New_York');
      const manilaTime = formatTZ(lastSyncUTC, 'Asia/Manila');

      const agoText = isMonthly
        ? `Synced ${Math.floor(msElapsed / (1000 * 60 * 60 * 24))}d ${Math.floor((msElapsed % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60))}h ago`
        : `Synced ${hoursAgo}h ${minutesAgo}m ago`;

      const nextText = isMonthly
        ? `next in ${Math.floor(msToNext / (1000 * 60 * 60 * 24))}d ${Math.floor((msToNext % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60))}h`
        : `next in ${hoursToNext}h ${minutesToNext}m`;

      return (
        <div className="bg-[#0c1a12] text-slate-300 text-xs px-4 md:px-8 py-2 flex flex-wrap items-center justify-between gap-3 border-b border-[#91c13e]/20 transition-all shrink-0">
          <div className="flex flex-wrap items-center gap-3">
            <div className="flex items-center gap-1 text-[#91c13e] font-bold">
              <Icon name="Globe" className="w-3.5 h-3.5" />
              <span className="uppercase tracking-widest text-[10px]"> Last Sync:</span>
            </div>
            <div className="flex flex-wrap items-center gap-x-3 gap-y-1 text-[11px] font-mono font-semibold">
              <span>Berlin: <span className="text-white">{berlinTime}</span></span>
              <span className="text-slate-600">|</span>
              <span>ANZ: <span className="text-white">{sydneyTime}</span></span>
              <span className="text-slate-600">|</span>
              <span>US: <span className="text-white">{nyTime}</span></span>
              <span className="text-slate-600">|</span>
              <span>Manila: <span className="text-white">{manilaTime}</span></span>
            </div>
          </div>
          <div className="text-[11px] text-slate-400 font-bold uppercase tracking-wider flex items-center gap-2">
            <span>{agoText}</span>
            <span className="text-slate-600">·</span>
            <span>next in <strong className="text-[#91c13e]">{nextText.replace('next in ', '')}</strong></span>
          </div>
        </div>
      );
    }

    // Helper to align multiple parsed excel sheets into a standardized consolidated row schema
    function reconcileSpreadsheets(sheetsMap) {
      const sheetNames = Object.keys(sheetsMap);
      const findSheet = (keywords) => {
        const found = sheetNames.find(n => keywords.some(k => n.toLowerCase().includes(k)));
        return found ? sheetsMap[found] : null;
      };

      const jiraRows = findSheet(["jira", "database"]) || sheetsMap[sheetNames[0]] || [];
      const headcountRows = findSheet(["headcount", "personnel", "staff", "linked"]) || sheetsMap[sheetNames[1]] || [];
      const trainingRows = findSheet(["training", "lss", "six sigma", "white belt"]) || sheetsMap[sheetNames[2]] || [];

      if (!jiraRows.length && !headcountRows.length && !trainingRows.length) return null;

      const jH = jiraRows[0] || [];
      const hH = headcountRows[0] || [];
      const tH = trainingRows[0] || [];

      const jCol = {
        issueKey: 0, issueId: 1, summary: 2, reporter: 3,
        dept: 5, status: 14, description: 19, created: 26,
        effectiveSavings: 8, totalCount: 9,
        startDate: 11, actualEnd: 13, plannedEnd: 12,
        businessImpact: 7, customerImpact: 10,
        assignee: 17, solution: 20,
        blockerCategory: 16, stageGate: 15,
        caseLabelFlag: 29, caseLabelValue: 30
      };

      const hCol = {
        leader: findColIndex(hH, "Leader"), name: findColIndex(hH, "Full Legal Name"),
        status: findColIndex(hH, "Status"), workerType: findColIndex(hH, "Worker Type"),
        jobFamily: findColIndex(hH, "Job Family"), level: findColIndex(hH, "Management Level"),
        location: findColIndex(hH, "Location"), country: findColIndex(hH, "Country"),
        tribe: findColIndex(hH, "Department/Tribe"), empId: findColIndex(hH, "Employee ID"),
        hireDate: findColIndex(hH, "Hire Date"), ftePct: findColIndex(hH, "FTE %")
      };

      const tCol = {
        leader: findColIndex(tH, "Leader"), name: findColIndex(tH, "Employee Name"),
        empId: findColIndex(tH, "Employee ID"), email: findColIndex(tH, "Email"),
        path: findColIndex(tH, "Path Title"), hireDate: findColIndex(tH, "Hire Date"),
        enrollDate: findColIndex(tH, "Learner Enrollment Date"), startDate: findColIndex(tH, "Learner Start Date"),
        status: findColIndex(tH, "Learner Status"), progress: findColIndex(tH, "Progress"),
        completionDate: findColIndex(tH, "Learner Completion Date")
      };

      const cHdr = Array(77).fill(null);
      cHdr[0]="Issue key"; cHdr[1]="Issue id"; cHdr[2]="Summary"; cHdr[3]="Reporter";
      cHdr[4]="Components"; cHdr[5]="Status"; cHdr[6]="Description"; cHdr[7]="Created";
      cHdr[11]="Effective Savings"; cHdr[12]="Total count"; cHdr[13]="Start Date";
      cHdr[14]="End Date"; cHdr[15]="Planned End Date"; cHdr[16]="Business impact";
      cHdr[17]="Customer impact"; cHdr[18]="Assignee"; cHdr[19]="Solution";
      cHdr[20]="Blocker Category"; cHdr[21]="Stage Gate";
      cHdr[29]="Case Label"; cHdr[30]="Concise Description";
      cHdr[31]="Leader"; cHdr[32]="Full Legal Name"; cHdr[33]="Status"; cHdr[34]="Worker Type";
      cHdr[35]="Job Family"; cHdr[36]="Management Level"; cHdr[37]="Location"; cHdr[38]="Country";
      cHdr[39]="Department/Tribe"; cHdr[40]="Employee ID"; cHdr[41]="Hire Date"; cHdr[42]="FTE %";
      cHdr[65]="Leader"; cHdr[66]="Employee Name"; cHdr[67]="Employee ID"; cHdr[68]="Email";
      cHdr[69]="Path Title"; cHdr[70]="Hire Date"; cHdr[71]="Learner Enrollment Date";
      cHdr[72]="Learner Start Date"; cHdr[73]="Learner Status"; cHdr[74]="Progress"; cHdr[75]="Learner Completion Date";

      const g = (row, ci) => (ci !== undefined && ci !== -1 && ci < row.length) ? row[ci] : null;
      const out = [{ row: cHdr, index_: 0 }];
      let idx = 1;

      for (let i = 1; i < jiraRows.length; i++) {
        const r = jiraRows[i];
        if (!r || !r.length) continue;
        const issueId = g(r, jCol.issueId);
        if (!issueId || String(issueId).trim() === '') continue;
        const cr = Array(77).fill(null);
        cr[0]=g(r,jCol.issueKey); cr[1]=g(r,jCol.issueId); cr[2]=g(r,jCol.summary);
        cr[3]=g(r,jCol.reporter); cr[4]=g(r,jCol.dept); cr[5]=g(r,jCol.status);

        cr[29]=g(r,jCol.caseLabelFlag); cr[30]=g(r,jCol.caseLabelValue);
        out.push({ row: cr, index_: idx++ });

      for (let i = 1; i < headcountRows.length; i++) {

        cr[40]=g(r,hCol.empId); cr[41]=g(r,hCol.hireDate); cr[42]=g(r,hCol.ftePct);
        out.push({ row: cr, index_: idx++ });
      }

      for (let i = 1; i < trainingRows.length; i++) {
        const r = trainingRows[i];
        if (!r || !r.length) continue;
        const name = g(r, tCol.name);
        if (!name || String(name).trim() === '' || name === 'DUMMY ENTRY' || String(name).startsWith('#')) continue;
        const cr = Array(77).fill(null);
        cr[65]=g(r,tCol.leader); cr[66]=g(r,tCol.name); cr[67]=g(r,tCol.empId);
        cr[68]=g(r,tCol.email); cr[69]=g(r,tCol.path); cr[70]=g(r,tCol.hireDate);
        cr[71]=g(r,tCol.enrollDate); cr[72]=g(r,tCol.startDate); cr[73]=g(r,tCol.status);
        cr[74]=g(r,tCol.progress); cr[75]=g(r,tCol.completionDate);
        out.push({ row: cr, index_: idx++ });
      }

      return out;
    }

            else { inQuotes = !inQuotes; current += char; }
          } else if ((char === '\n' || (char === '\r' && csvText[i+1] === '\n')) && !inQuotes) {
            if (char === '\r') i++;
            rows.push(current);
            current = '';
          } else {
            current += char;
          }
        }
        if (current) rows.push(current);
        return rows.map(line => {
          const result = []; let cur = '', inQ = false;
          for (let i = 0; i < line.length; i++) {
            const c = line[i];
            if (c === '"') {
              if (inQ && line[i+1] === '"') { cur += '"'; i++; }
              else { inQ = !inQ; }
            } else if (c === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
            else { cur += c; }
          }
          result.push(cur.trim());
          return result;
        }).filter(row => row.some(cell => cell !== ''));
      };

      // Fetch all three tabs and reconcile
      const fetchThreeSheets = async () => {
        if (!googleUrlJira && !googleUrlHc && !googleUrlTr) return;
        setLoading(true);
        setStatusMessage('Connecting to Google Sheets...');
        try {
          const [jiraRows, hcRows, trRows] = await Promise.all([
            fetchCsv(googleUrlJira),
            fetchCsv(googleUrlHc),
            fetchCsv(googleUrlTr)
          ]);
          const sheetsMap = {};
          if (jiraRows) sheetsMap["Database Jira"] = jiraRows;
          if (hcRows) sheetsMap["Headcount Tracker"] = hcRows;
          if (trRows) sheetsMap["White Belt Training"] = trRows;
          const reconciled = reconcileSpreadsheets(sheetsMap);
          if (reconciled) {
            setData(reconciled);
            localStorage.setItem('hf_opex_jira_url', googleUrlJira);
            localStorage.setItem('hf_opex_hc_url', googleUrlHc);
            localStorage.setItem('hf_opex_tr_url', googleUrlTr);
            setSyncSource('Google Sheets (3-Tab Live Sync)');
            setStatusMessage('🟢 All three tabs synced successfully!');
            setIntegrationOpen(false);
          } else {
            throw new Error("Reconciliation failed. Check that all three URLs point to the correct tabs.");
          }
        } catch (error) {
          setStatusMessage(`🔴 Sync Failed: ${error.message}`);
        } finally {
          setLoading(false);
        }
      };

      // Process workbook from uploader or fetcher
      const processWorkbook = (workbook) => {
        const sheetsMap = {};
        workbook.SheetNames.forEach(sheetName => {
          const rawRows = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName], { header: 1 });
          if (rawRows.length > 0) {
            sheetsMap[sheetName] = rawRows;
          }
        });

        const reconciled = reconcileSpreadsheets(sheetsMap);
        if (reconciled) {
          setData(reconciled);
        } else {
          throw new Error("Could not find relevant column sets inside workbook. Check tab titles.");
        }
      };

      // Drag-and-drop local Excel file uploads
      const handleExcelUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        setLoading(true);
        setStatusMessage("Reading spreadsheet workbook...");

        const reader = new FileReader();
        reader.onload = (evt) => {
          try {
            const dataBytes = new Uint8Array(evt.target.result);
            const workbook = XLSX.read(dataBytes, { type: 'array' });
            processWorkbook(workbook);
            setSyncSource(`Excel: ${file.name}`);
            setStatusMessage('🟢 Workbook integrated!');
            setIntegrationOpen(false);
          } catch (err) {
            setStatusMessage(`🔴 Upload parsing error: ${err.message}`);
          } finally {
            setLoading(false);
          }
        };
        reader.readAsArrayBuffer(file);
      };

                    <div className="relative border-2 border-dashed border-[#91c13e]/30 rounded-2xl p-8 bg-emerald-950/20 text-center hover:border-[#91c13e]/60 transition-all cursor-pointer">
                      <input 
                        type="file" 
                        accept=".xlsx, .xls, .csv" 
                        onChange={handleExcelUpload} 
                        className="absolute inset-0 opacity-0 cursor-pointer w-full h-full"
                      />
                      <Icon name="Target" className="w-8 h-8 text-[#91c13e] mx-auto mb-2" />
                      <span className="font-bold text-slate-100 block">Click or Drop Excel Workbook Here</span>
                      <span className="text-[10px] text-slate-400 block mt-1">Accepts multiple-sheet xlsx files (Jira database, Headcount Tracker, LSS Training)</span>
                    </div>
                  </div>
                )}

                {/* TAB 3: GOOGLE SHEETS LIVE SYNC */}
                {integrationTab === 'googlesheets' && (
                  <div className="space-y-4 animate-fade-in text-xs max-w-4xl">
                    <div className="flex items-center gap-2 text-sm font-black text-[#91c13e] uppercase">
                      <Icon name="Globe" className="w-5 h-5 text-[#91c13e]" />
                      <span>Live Google Sheet — 3-Tab Sync</span>
                    </div>

                    <div className="bg-emerald-950/40 p-4 rounded-xl border border-emerald-800/40 space-y-2 text-slate-300">
                      <span className="font-bold text-white block">💡 How to connect each tab:</span>
                      <ol className="list-decimal list-inside space-y-1.5 ml-1 font-semibold text-slate-200">
                        <li>Open your tracker in Google Sheets.</li>
                        <li>Go to <strong>File &gt; Share &gt; Publish to web</strong>.</li>
                        <li>Select a tab (e.g. <strong className="text-[#91c13e]">Database Jira</strong>) → set format to <strong className="text-[#91c13e]">CSV</strong> → click Publish → copy URL.</li>
                        <li>Repeat for <strong className="text-[#91c13e]">Headcount Tracker - Linked</strong> and <strong className="text-[#91c13e]">White Belt Training OPEX Tracking</strong>.</li>
                        <li>Paste each URL below and click <strong className="text-[#91c13e]">Connect All</strong>. URLs are saved and auto-load on every visit.</li>
                      </ol>
                    </div>

                    <div className="space-y-3">
                      <div className="space-y-1.5">
                        <label className="text-[10px] uppercase font-black tracking-wider text-slate-300 block">1. Database Jira Tab URL</label>
                        <input
                          type="text"
                          placeholder="Paste 'Database Jira' published CSV URL..."
                          value={googleUrlJira}
                          onChange={e => setGoogleUrlJira(e.target.value)}
                          className="bg-[#062115] border border-[#91c13e]/30 rounded-xl px-4 py-3 text-sm text-slate-100 placeholder-slate-400 outline-none focus:ring-2 focus:ring-[#91c13e] w-full font-mono font-semibold"
                        />
                      </div>
                      <div className="space-y-1.5">
                        <label className="text-[10px] uppercase font-black tracking-wider text-slate-300 block">2. Headcount Tracker Tab URL</label>
                        <input
                          type="text"
                          placeholder="Paste 'Headcount Tracker - Linked' published CSV URL..."
                          value={googleUrlHc}
                          onChange={e => setGoogleUrlHc(e.target.value)}
                          className="bg-[#062115] border border-[#91c13e]/30 rounded-xl px-4 py-3 text-sm text-slate-100 placeholder-slate-400 outline-none focus:ring-2 focus:ring-[#91c13e] w-full font-mono font-semibold"
                        />
                      </div>
                      <div className="space-y-1.5">
                        <label className="text-[10px] uppercase font-black tracking-wider text-slate-300 block">3. White Belt Training Tab URL</label>
                        <input
                          type="text"
                          placeholder="Paste 'White Belt Training OPEX Tracking' published CSV URL..."
                          value={googleUrlTr}
                          onChange={e => setGoogleUrlTr(e.target.value)}
                          className="bg-[#062115] border border-[#91c13e]/30 rounded-xl px-4 py-3 text-sm text-slate-100 placeholder-slate-400 outline-none focus:ring-2 focus:ring-[#91c13e] w-full font-mono font-semibold"
                        />
                      </div>
                      <div className="flex justify-end">
                        <button
                          onClick={fetchThreeSheets}
                          className="bg-[#91c13e] text-[#062115] hover:bg-[#94D500] font-black uppercase text-xs px-6 py-3 rounded-xl transition-all shadow-md shrink-0 font-extrabold tracking-wider"
                        >
                          Connect All 3 Tabs
                        </button>
                      </div>
                    </div>
                  </div>
                )}

                {/* Active Data Source Summary footer */}
                <div className="border-t border-emerald-800/60 pt-4 flex items-center justify-between gap-4 text-xs">
                  <div>
                    <span className="text-slate-400 font-bold uppercase tracking-wider block text-[10px]">Active Data Source:</span>
                    <strong className="text-white text-sm font-extrabold uppercase font-mono">{syncSource}</strong>
                  </div>
                  <button 
                    onClick={resetToDefault} 
                    className="bg-slate-700 hover:bg-slate-600 text-white font-bold uppercase text-[10px] px-3 py-2 rounded-lg transition-all"
                  >
                    Reset mockup
                  </button>
                </div>

              </div>

              {/* Loader Spinner & Feedback Banner */}
              {statusMessage && (
                <div className="max-w-6xl mx-auto mt-4 px-4 py-2.5 rounded-lg bg-emerald-950/60 border border-[#91c13e]/20 text-xs font-bold font-mono tracking-wide flex items-center justify-between gap-4">
                  <span className="text-slate-300 leading-relaxed whitespace-pre-line">{statusMessage}</span>
                  {loading && <Icon name="RefreshCw" className="w-4 h-4 text-[#91c13e] animate-spin shrink-0" />}
                </div>
              )}
            </div>
          )}

          {/* Timezone-Safe Regional Bar */}
          <RegionalRefreshBar view={view} />

          {/* PORTAL VIEWPORT */}
          <main className="flex-1 w-full max-w-7xl mx-auto p-4 md:p-6 lg:p-8 space-y-6">
            {view === 'opex' && <OpexCiDashboard data={data} />}
            {view === 'headcount' && <HeadcountTracker data={data} />}
            {view === 'training' && (
              <LssTrainingTracker data={data} updateItem={updateItem} deleteItem={deleteItem} insertItem={insertItem} />
            )}
            {view === 'ideas' && <IdeaParticipation data={data} />}
          </main>
        </div>
      );
    }

    /* ===========================================================================
       PORTAL CORE VIEWS (re-rendering elements cleanly inside standalone HTML)
       =========================================================================== */
       
    // VIEW 1 — OPEX CI DASHBOARD (sheet: "Database Jira")
    function OpexCiDashboard({ data }) {
      const [yearFilter, setYearFilter] = useState('All');
      const [halfYearFilter, setHalfYearFilter] = useState('All');
      const [quarterFilter, setQuarterFilter] = useState('All');
      const [monthFilter, setMonthFilter] = useState('All');
      const [deptFilter, setDeptFilter] = useState('All');
      const [searchQuery, setSearchQuery] = useState('');

      const [analyticsTab, setAnalyticsTab] = useState('Conversion');
      const [initiativeTypeFilter, setInitiativeTypeFilter] = useState('CI');

      const [tableOwnerFilter, setTableOwnerFilter] = useState('All');
      const [tableStatusFilter, setTableStatusFilter] = useState('All');
      const [tableHealthFilter, setTableHealthFilter] = useState('All');
      const [tableCaseLabelFilter, setTableCaseLabelFilter] = useState('All');
      const [tableStageGateFilter, setTableStageGateFilter] = useState('All');

      const [potentialActualFilter, setPotentialActualFilter] = useState('Potential');
      const [expandedRow, setExpandedRow] = useState(null);

      const [sortField, setSortField] = useState('savings');
      const [sortAsc, setSortAsc] = useState(false);

      const headers = useMemo(() => {
        const headerRow = data.find(r => r.row.some(c => typeof c === 'string' && c.toLowerCase().includes('summary')));
        return headerRow ? headerRow.row : (data[0]?.row || []);
      }, [data]);

      const colIndex = useMemo(() => {
        const idx = (str) => headers.findIndex(h => h?.toString().toLowerCase().includes(str.toLowerCase()));
        const exactIdx = (str) => headers.findIndex(h => h?.toString() === str);

        const stageGateIdx = findColIndex(headers, "Stage Gate") !== -1 ? findColIndex(headers, "Stage Gate") : (findColIndex(headers, "Custom field (Stage Gate)") !== -1 ? findColIndex(headers, "Custom field (Stage Gate)") : 15);
        const caseLabelFlagIdx = findColIndex(headers, "Case Label") !== -1 ? findColIndex(headers, "Case Label") : 29;
        const caseLabelValueIdx = findColIndex(headers, "Concise Description") !== -1 ? findColIndex(headers, "Concise Description") : 30;

        return {
          reporter: exactIdx("Reporter"),
          dept: exactIdx("Components"),
          status: exactIdx("Status"),
          summary: exactIdx("Summary"),
          description: exactIdx("Description"),
          issueKey: exactIdx("Issue key"),
          issueId: exactIdx("Issue id"),
          created: exactIdx("Created"),
          delayed: idx("Delayed?"),
          savedHrs: idx("Saved / Year (hrs)"),
          savedFte: idx("Saved / Year (FTE)"),
          effectiveSavings: idx("Effective Savings"),
          totalCount: idx("Total count"),
          startDate: idx("Start Date"),
          actualEnd: idx("End Date"),
          plannedEnd: idx("Planned End Date"),
          businessImpact: idx("Business impact"),
          customerImpact: idx("Customer impact"),
          assignee: exactIdx("Assignee"),
          solution: exactIdx("Solution"),
          blockerCategory: idx("Blocker Category"),
          stageGate: stageGateIdx,
          caseLabelFlag: caseLabelFlagIdx,
          caseLabelValue: caseLabelValueIdx
        };
      }, [headers]);

      const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

      const processedData = useMemo(() => {
        if (!headers.length) return [];
        const allRows = data.filter(item => {
          const row = item.row;
          if (row === headers) return false;
          const issueIdVal = row[colIndex.issueId];
          return issueIdVal !== undefined && issueIdVal !== null && String(issueIdVal).trim() !== '';
        });
        return allRows.filter(item => {
          const row = item.row;
          const deptVal = (row[colIndex.dept] || "").toString().trim();
          const deptLower = deptVal.toLowerCase();
          if (!deptVal || deptLower === "unassigned" || deptLower.includes("hr software support")) return false;
          if (!row[colIndex.summary] && !row[colIndex.issueKey]) return false;
          return true;
        }).map(item => {
          const row = item.row;
          const createdDate = parseDateSafe(row[colIndex.startDate]) || parseDateSafe(row[colIndex.created]);
          const status = row[colIndex.status] || "Open";
          const statusLower = status.toLowerCase().trim();
          const isCurrentPipeline = ['open', 'on hold', 'on-hold', 'in progress', 'reopened'].includes(statusLower);
          const isSubmitted = ['on hold', 'open', 'reopened', 'in progress', 'on-hold'].includes(statusLower);
          const isCompleted = ['resolved', 'done'].includes(statusLower);
          const isClosed = statusLower === 'closed';
          
          const parseNum = (v) => {
            if (typeof v === 'number') return v;
            if (typeof v === 'string') {
              const clean = v.replace(/[^0-9.-]/g, '');
              const n = parseFloat(clean);
              return isNaN(n) ? 0 : n;
            }
            return 0;
          };

          const rawEffSavings = parseNum(row[colIndex.effectiveSavings]);
          const rawTotalCount = parseNum(row[colIndex.totalCount]);

          const hoursPerYear = (rawEffSavings * rawTotalCount) / 60;
          const fteValue = hoursPerYear / 2080;
          const potentialSavings = fteValue * 36000;
          
          const mIdx = createdDate ? createdDate.getMonth() : null;
          const quarter = mIdx !== null ? Math.floor(mIdx / 3) + 1 : null;
          const plannedDate = parseDateSafe(row[colIndex.plannedEnd]);
          const isDelayed = isSubmitted && plannedDate && plannedDate < new Date();

          const rawFlag = String(row[colIndex.caseLabelFlag] || '').toLowerCase().trim();
          const isFlagYes = ['yes', 'y', 'true', '1'].includes(rawFlag);
          const caseLabel = isFlagYes ? String(row[colIndex.caseLabelValue] || '').trim() : '';

          const stageGateRaw = String(row[colIndex.stageGate] || '').trim();
          const stageGate = (isClosed && stageGateRaw) ? stageGateRaw : '';

          const plannedDateVal = parseDateSafe(row[colIndex.plannedEnd]);
          const projectHealth = isCurrentPipeline ? (!plannedDateVal ? 'ON TRACK' : (plannedDateVal < new Date() ? 'DELAYED' : 'ON TRACK')) : '—';

          return {
            index_: item.index_,
            row: row,
            id: 'init-' + item.index_,
            summary: row[colIndex.summary] || "Untitled Initiative",
            dept: row[colIndex.dept] || "N/A",
            status: status,
            isSubmitted,
            isCompleted,
            isClosed,
            isCurrentPipeline,
            lead: row[colIndex.reporter] || "Unknown",
            savings: potentialSavings,
            fte: fteValue,
            isDelayed,
            year: createdDate ? createdDate.getFullYear() : 'Unknown',
            month: mIdx !== null ? monthNames[mIdx] : 'Unknown',
            monthIdx: mIdx,
            quarter: quarter ? 'Q' + quarter : 'Unknown',
            issueKey: row[colIndex.issueKey] || 'TBD',
            assignee: row[colIndex.assignee],
            startDate: parseDateSafe(row[colIndex.startDate]),
            endDate: (isCompleted || isClosed) ? parseDateSafe(row[colIndex.actualEnd]) : parseDateSafe(row[colIndex.plannedEnd]),
            description: row[colIndex.description],
            businessImpact: row[colIndex.businessImpact],
            customerImpact: row[colIndex.customerImpact],
            solution: row[colIndex.solution],
            blockerCategory: row[colIndex.blockerCategory],
            caseLabel,
            stageGate,
            projectHealth
          };
        });
      }, [data, colIndex, headers]);

      // Apply Navigation Filters globally
      const globallyFilteredData = useMemo(() => {
        return processedData.filter(d => {
          const matchesYear = yearFilter === 'All' || d.year.toString() === yearFilter;
          const isH1 = d.quarter === 'Q1' || d.quarter === 'Q2';
          const isH2 = d.quarter === 'Q3' || d.quarter === 'Q4';
          const matchesHalfYear = halfYearFilter === 'All' ||
            (halfYearFilter === 'H1' && isH1) ||
            (halfYearFilter === 'H2' && isH2);
          const matchesQuarter = quarterFilter === 'All' || d.quarter === quarterFilter;
          const matchesMonth = monthFilter === 'All' || d.month === monthFilter;
          const matchesDept = deptFilter === 'All' || d.dept === deptFilter;
          const matchesSearch = d.summary.toLowerCase().includes(searchQuery.toLowerCase()) || d.issueKey.toLowerCase().includes(searchQuery.toLowerCase()) || d.lead.toLowerCase().includes(searchQuery.toLowerCase());
          return matchesYear && matchesHalfYear && matchesQuarter && matchesMonth && matchesDept && matchesSearch;
        });
      }, [processedData, yearFilter, halfYearFilter, quarterFilter, monthFilter, deptFilter, searchQuery]);

      const activeCiData = useMemo(() => {
        return globallyFilteredData.filter(d => !d.isClosed);
      }, [globallyFilteredData]);

      const nonCiData = useMemo(() => {
        return globallyFilteredData.filter(d => d.isClosed);
      }, [globallyFilteredData]);

      const tableOwnerOptions = useMemo(() => ['All', ...new Set(globallyFilteredData.map(d => d.lead))].sort(), [globallyFilteredData]);
      const tableStatusOptions = useMemo(() => ['All', ...new Set(globallyFilteredData.map(d => d.status))].sort(), [globallyFilteredData]);

      const caseLabelOptions = useMemo(() => {
        return ['All', ...new Set(globallyFilteredData.map(d => d.caseLabel).filter(Boolean))].sort();
      }, [globallyFilteredData]);

      const stageGateOptions = useMemo(() => {
        const closedItems = globallyFilteredData.filter(d => d.isClosed);
        return ['All', ...new Set(closedItems.map(d => d.stageGate).filter(Boolean))].sort();
      }, [globallyFilteredData]);

      const filteredActiveData = useMemo(() => {
        return potentialActualFilter === 'Potential' ? activeCiData : activeCiData.filter(d => d.isCompleted);
      }, [activeCiData, potentialActualFilter]);

      const stats = useMemo(() => {
        const pipelineCount = globallyFilteredData.filter(d => d.isCurrentPipeline && !d.isClosed).length;
        const totalSavings = filteredActiveData.reduce((acc, curr) => acc + curr.savings, 0);
        const totalFTE = filteredActiveData.reduce((acc, curr) => acc + curr.fte, 0);
        const delayCount = filteredActiveData.filter(d => d.isDelayed).length;

        let multiplier = 1;
        let targetGoalText = "Goal: 2.50 FTE saved per quarter";
        if (monthFilter !== 'All') {
          multiplier = 1 / 3;
          targetGoalText = "Goal: 0.83 FTE saved per month";
        } else if (quarterFilter !== 'All') {
          multiplier = 1;
          targetGoalText = "Goal: 2.50 FTE saved per quarter";
        } else if (halfYearFilter !== 'All') {
          multiplier = 2;
          targetGoalText = "Goal: 5.00 FTE saved per half year";
        } else {
          multiplier = 4;
          targetGoalText = "Goal: 10.00 FTE saved per year";
        }

        const fteTarget = 2.5 * multiplier;
        const savingsTarget = 90000 * multiplier;

        return {
          pipelineCount,
          savings: totalSavings,
          fte: totalFTE,
          delayRate: activeCiData.length > 0 ? (delayCount / activeCiData.length) * 100 : 0,
          fteTarget,
          savingsTarget,
          fteProgress: (totalFTE / (fteTarget || 1)) * 100,
          targetGoalText
        };
      }, [globallyFilteredData, filteredActiveData, monthFilter, quarterFilter, halfYearFilter, activeCiData]);

      const momentumData = useMemo(() => {
        const shortMonths = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        return shortMonths.map((m, i) => {
          const mItems = activeCiData.filter(d => d.monthIdx === i);
          return {
            month: m,
            Submitted: mItems.filter(d => d.isSubmitted).length,
            Completed: mItems.filter(d => d.isCompleted).length
          };
        });
      }, [activeCiData]);

      const teamComparison = useMemo(() => {
        const currentBase = initiativeTypeFilter === 'CI' ? activeCiData : nonCiData;
        const teams = {};
        currentBase.forEach(d => {
          if (!teams[d.dept]) {
            teams[d.dept] = { dept: d.dept, submitted: 0, completed: 0, closed: 0, fte: 0, savings: 0 };
          }
          if (initiativeTypeFilter === 'CI') {
            if (d.isSubmitted) teams[d.dept].submitted += 1;
            if (d.isCompleted) teams[d.dept].completed += 1;
          } else {
            teams[d.dept].closed += 1;
          }
          teams[d.dept].fte += d.fte;
          teams[d.dept].savings += d.savings;
        });
        return Object.values(teams).sort((a, b) => {
          if (analyticsTab === 'Conversion') {
            if (initiativeTypeFilter === 'CI') {
              return (b.submitted + b.completed) - (a.submitted + a.completed);
            }
            return b.closed - a.closed;
          }
          return b.fte - a.fte;
        });
      }, [activeCiData, nonCiData, initiativeTypeFilter, analyticsTab]);

      const maxFteVal = useMemo(() => {
        return d3.max(teamComparison, t => t.fte) || 1;
      }, [teamComparison]);

      const portfolioData = useMemo(() => {
        const filtered = globallyFilteredData.filter(d => {
          const matchesOwner = tableOwnerFilter === 'All' || d.lead === tableOwnerFilter;
          const matchesStatus = tableStatusFilter === 'All' || d.status === tableStatusFilter;
          const matchesHealth = tableHealthFilter === 'All' || (d.isCurrentPipeline && d.projectHealth === tableHealthFilter);
          const matchesCaseLabel = tableCaseLabelFilter === 'All' || d.caseLabel === tableCaseLabelFilter;
          const matchesStageGate = tableStageGateFilter === 'All' || d.stageGate === tableStageGateFilter;
          return matchesOwner && matchesStatus && matchesHealth && matchesCaseLabel && matchesStageGate;
        });
        return filtered.sort((a, b) => {
          let aVal = a[sortField];
          let bVal = b[sortField];
          if (typeof aVal === 'string') {
            return sortAsc ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);
          }
          return sortAsc ? (aVal - bVal) : (bVal - aVal);
        });
      }, [globallyFilteredData, tableOwnerFilter, tableStatusFilter, tableHealthFilter, tableCaseLabelFilter, tableStageGateFilter, sortField, sortAsc]);

      const yearsOptions = useMemo(() => ['All', ...new Set(processedData.map(d => d.year.toString()).filter(y => y !== 'Unknown' && y !== '1899'))].sort(), [processedData]);
      const deptsOptions = useMemo(() => ['All', ...new Set(processedData.map(d => d.dept))].sort(), [processedData]);

      const toggleSort = (field) => {
        if (sortField === field) {
          setSortAsc(!sortAsc);
        } else {
          setSortField(field);
          setSortAsc(false);
        }
      };

      const potActToggle = (
        <div className="bg-slate-100 p-0.5 rounded-lg flex gap-0.5 shrink-0 ml-1">
          <button onClick={(e) => { e.stopPropagation(); setPotentialActualFilter('Potential'); }} className={'px-1.5 py-0.5 rounded-md text-[8px] font-black uppercase transition-all ' + (potentialActualFilter === 'Potential' ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-400 hover:text-slate-600')}>Pot.</button>
          <button onClick={(e) => { e.stopPropagation(); setPotentialActualFilter('Actual'); }} className={'px-1.5 py-0.5 rounded-md text-[8px] font-black uppercase transition-all ' + (potentialActualFilter === 'Actual' ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-400 hover:text-slate-600')}>Act.</button>
        </div>
      );

      return (
        <div className="space-y-6 animate-fade-in">
          {/* Sub-header Filter controls */}
          <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 flex flex-col lg:flex-row items-start lg:items-center justify-between gap-4">
            <div>
              <h1 className="text-2xl font-black text-[#062115] tracking-tight">OPEX CI Dashboard</h1>
              <p className="text-xs text-slate-400 font-bold uppercase tracking-wider mt-1">Continuous Improvement Portfolio</p>
            </div>
            <div className="flex flex-wrap items-center gap-3 w-full lg:w-auto">
              <select value={yearFilter} onChange={e => setYearFilter(e.target.value)} className="bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-xs font-bold uppercase tracking-wider text-slate-700 outline-none focus:ring-2 focus:ring-[#91c13e] cursor-pointer">
                <option value="All">All Years</option>
                {yearsOptions.map(y => <option key={y} value={y}>{y}</option>)}
              </select>
              <select value={quarterFilter} onChange={e => setQuarterFilter(e.target.value)} className="bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-xs font-bold uppercase tracking-wider text-slate-700 outline-none focus:ring-2 focus:ring-[#91c13e] cursor-pointer">
                <option value="All">All Quarters</option>
                <option value="Q1">Q1</option>
                <option value="Q2">Q2</option>
                <option value="Q3">Q3</option>
                <option value="Q4">Q4</option>
              </select>
              <select value={halfYearFilter} onChange={e => setHalfYearFilter(e.target.value)} className="bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-xs font-bold uppercase tracking-wider text-slate-700 outline-none focus:ring-2 focus:ring-[#91c13e] cursor-pointer">
                <option value="All">All Half Years</option>
                <option value="H1">H1</option>
                <option value="H2">H2</option>
              </select>
              <select value={monthFilter} onChange={e => setMonthFilter(e.target.value)} className="bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-xs font-bold uppercase tracking-wider text-slate-700 outline-none focus:ring-2 focus:ring-[#91c13e] cursor-pointer">
                <option value="All">All Months</option>
                {monthNames.map(m => <option key={m} value={m}>{m}</option>)}
              </select>
              <select value={deptFilter} onChange={e => setDeptFilter(e.target.value)} className="bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-xs font-bold uppercase tracking-wider text-[#0f172a] outline-none focus:ring-2 focus:ring-[#91c13e] cursor-pointer">
                <option value="All">All Teams</option>
                {deptsOptions.map(d => <option key={d} value={d}>{d}</option>)}
              </select>
              <div className="relative flex-1 lg:flex-none">
                <Icon name="Search" className="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" />
                <input type="text" placeholder="SEARCH PORTFOLIO..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)} className="bg-slate-50 border border-slate-200 rounded-xl pl-10 pr-4 py-2.5 text-xs font-bold tracking-wider text-slate-700 placeholder-slate-400 uppercase outline-none focus:ring-2 focus:ring-[#91c13e] w-full lg:w-48" />
              </div>
            </div>

    // VIEW 2 — HEADCOUNT TRACKER
    function HeadcountTracker({ data }) {
      const [searchQuery, setSearchQuery] = useState('');
      const [leaderFilter, setLeaderFilter] = useState('All');
      const [statusFilter, setStatusFilter] = useState('All');
      const [countryFilter, setCountryFilter] = useState('All');

      const headers = useMemo(() => data[0]?.row || [], [data]);

      const col = useMemo(() => {
        return {
          leader: findColIndex(headers, "Leader", 31, 63),
          name: findColIndex(headers, "Full Legal Name", 31, 63),
          status: findColIndex(headers, "Status", 31, 63),
          workerType: findColIndex(headers, "Worker Type", 31, 63),
          jobFamily: findColIndex(headers, "Job Family", 31, 63),
          level: findColIndex(headers, "Management Level", 31, 63),
          location: findColIndex(headers, "Location", 31, 63),
          country: findColIndex(headers, "Country", 31, 63),
          tribe: findColIndex(headers, "Department/Tribe", 31, 63),
          empId: findColIndex(headers, "Employee ID", 31, 63),
          hireDate: findColIndex(headers, "Hire Date", 31, 63),
          ftePct: findColIndex(headers, "FTE %", 31, 63),
        };
      }, [headers]);

      const processedRows = useMemo(() => {
        if (data.length <= 1) return [];
        return data.slice(1)
          .filter(item => {
            const row = item.row;
            const name = safeVal(row, col.name);
            return name && name !== 'DUMMY ENTRY' && name.trim() !== '';
          })
          .map(item => {
            const row = item.row;
            const rawFtePct = parseFloat(safeVal(row, col.ftePct) || '100');
            const fteWeight = 1;
            return {
              id: 'hc-' + item.index_,
              index_: item.index_,
              name: safeVal(row, col.name),
              empId: safeVal(row, col.empId) || '—',
              leader: safeVal(row, col.leader) || 'Unassigned',
              jobFamily: safeVal(row, col.jobFamily) || '—',
              level: safeVal(row, col.level) || '—',
              status: safeVal(row, col.status) || 'Active',
              workerType: safeVal(row, col.workerType) || 'Employee',
              location: safeVal(row, col.location) || '—',
              country: safeVal(row, col.country) || '—',
              tribe: safeVal(row, col.tribe) || 'Unspecified',
              hireDate: parseDateSafe(safeVal(row, col.hireDate)),
              ftePct: rawFtePct,
              fteWeight,
            };
          });
      }, [data, col]);

      const stats = useMemo(() => {
        const total = processedRows.reduce((sum, r) => sum + r.fteWeight, 0);
        const active = processedRows.filter(r => r.status.toLowerCase().trim() === 'active').reduce((sum, r) => sum + r.fteWeight, 0);
        const onLeave = processedRows.filter(r => r.status.toLowerCase().trim() === 'on leave').reduce((sum, r) => sum + r.fteWeight, 0);
        const contingent = processedRows.filter(r => r.workerType.toLowerCase().includes('contingent')).reduce((sum, r) => sum + r.fteWeight, 0);
        const countries = new Set(processedRows.map(r => r.country).filter(Boolean)).size;
        return { total, active, onLeave, contingent, countries };
      }, [processedRows]);

      const leaderTeams = useMemo(() => {
        const map = {};
        processedRows.forEach(r => {
          if (!map[r.leader]) {
            map[r.leader] = { name: r.leader, total: 0, active: 0 };
          }
          map[r.leader].total++;
          if (r.status.toLowerCase().trim() === 'active') {
            map[r.leader].active++;
          }
        });
        return Object.values(map).sort((a, b) => b.total - a.total);
      }, [processedRows]);

      const maxLeaderTeam = useMemo(() => {
        return d3.max(leaderTeams, l => l.total) || 1;
      }, [leaderTeams]);

      const tribeDist = useMemo(() => {
        const map = {};
        processedRows.forEach(r => {
          map[r.tribe] = (map[r.tribe] || 0) + 1;
        });
        return Object.entries(map)
          .map(([name, count]) => ({ name, count }))
          .sort((a, b) => b.count - a.count)
          .slice(0, 6);
      }, [processedRows]);

      const filteredRows = useMemo(() => {
        return processedRows.filter(r => {
          const q = searchQuery.toLowerCase();

      const [statusFilter, setStatusFilter] = useState('All');

      const [isModalOpen, setIsModalOpen] = useState(false);
      const [editingItem, setEditingItem] = useState(null);

      // Form Field States
      const [formName, setFormName] = useState('');
      const [formId, setFormId] = useState('');
      const [formEmail, setFormEmail] = useState('');
      const [formLeader, setFormLeader] = useState('');
      const [formPath, setFormPath] = useState('Lean Six Sigma White Belt');
      const [formStatus, setFormStatus] = useState('Not yet started');
      const [formProgress, setFormProgress] = useState(0);
      const [formEnrollDate, setFormEnrollDate] = useState('');
      const [formStartDate, setFormStartDate] = useState('');
      const [formCompletionDate, setFormCompletionDate] = useState('');
      const [formHireDate, setFormHireDate] = useState('');

      const headers = useMemo(() => data[0]?.row || [], [data]);

      const col = useMemo(() => {
        return {
          leader: findColIndex(headers, "Leader", 65, 77),
          name: findColIndex(headers, "Employee Name", 65, 77),
          empId: findColIndex(headers, "Employee ID", 65, 77),
          email: findColIndex(headers, "Email", 65, 77),
          path: findColIndex(headers, "Path Title", 65, 77),
          hireDate: findColIndex(headers, "Hire Date", 65, 77),
          enrollDate: findColIndex(headers, "Learner Enrollment Date", 65, 77),
          startDate: findColIndex(headers, "Learner Start Date", 65, 77),
          status: findColIndex(headers, "Learner Status", 65, 77),
          progress: findColIndex(headers, "Progress", 65, 77),
          completionDate: findColIndex(headers, "Learner Completion Date", 65, 77),
        };
      }, [headers]);

      const processedRows = useMemo(() => {
        if (data.length <= 1) return [];
        return data.slice(1)
          .filter(item => {
            const row = item.row;
            const name = safeVal(row, col.name);
            if (!name || name.trim() === '' || name === 'DUMMY ENTRY' || name === '#N/A') return false;
            // Also filter out formula error strings
            if (String(name).startsWith('#')) return false;
            return true;
          })
          .map(item => {
            const row = item.row;
            return {
              id: 'lss-' + item.index_,
              index_: item.index_,
              name: safeVal(row, col.name),
              empId: safeVal(row, col.empId) ? String(safeVal(row, col.empId)).replace(/\.0$/, '') : '—',
              email: safeVal(row, col.email) || '—',
              leader: safeVal(row, col.leader) || 'Unassigned',
              path: safeVal(row, col.path) || 'Lean Six Sigma White Belt',
              status: safeVal(row, col.status) || 'Not enrolled',
              progress: parseFloat(safeVal(row, col.progress)) || 0,
              hireDate: parseDateSafe(safeVal(row, col.hireDate)),
              enrollDate: parseDateSafe(safeVal(row, col.enrollDate)),
              startDate: parseDateSafe(safeVal(row, col.startDate)),
              completionDate: parseDateSafe(safeVal(row, col.completionDate)),
            };
          });
      }, [data, col]);

      const stats = useMemo(() => {
        const total = processedRows.length;
        const successful = processedRows.filter(r => r.status.toLowerCase().trim() === 'successful').length;
        const notEnrolled = processedRows.filter(r => r.status.toLowerCase().trim() === 'not enrolled').length;
        const activeEnrolled = total - notEnrolled - successful;
        const completionRate = total > 0 ? Math.round((successful / total) * 100) : 0;
        return { total, successful, notEnrolled, activeEnrolled, completionRate };
      }, [processedRows]);

      const leaderProgressStats = useMemo(() => {
        const map = {};
        processedRows.forEach(r => {
          if (!map[r.leader]) {
            map[r.leader] = { name: r.leader, total: 0, successful: 0 };
          }
          map[r.leader].total++;
          if (r.status.toLowerCase().trim() === 'successful') {
            map[r.leader].successful++;
          }
        });
        return Object.entries(map)
          .map(([name, d]) => ({ name, total: d.total, successful: d.successful, rate: d.total > 0 ? Math.round((d.successful / d.total) * 100) : 0 }))
          .sort((a, b) => b.rate - a.rate)
          .slice(0, 8);
      }, [processedRows]);

      const handleStandingClick = (name) => {
        setLeaderFilter(leaderFilter === name ? 'All' : name);

      const handleStatusClick = (status) => {
        setStatusFilter(statusFilter === status ? 'All' : status);
      };

      const filteredRows = useMemo(() => {
        return processedRows.filter(r => {
          const q = searchQuery.toLowerCase();
          const matchSearch = q === '' || r.name.toLowerCase().includes(q) || r.empId.toLowerCase().includes(q) || r.leader.toLowerCase().includes(q);
          const matchLeader = leaderFilter === 'All' || r.leader === leaderFilter;
          const matchStatus = statusFilter === 'All' || r.status.toLowerCase().trim() === statusFilter.toLowerCase().trim();
          return matchSearch && matchLeader && matchStatus;
        });
      }, [processedRows, searchQuery, leaderFilter, statusFilter]);

      const leadersList = useMemo(() => ['All', ...new Set(processedRows.map(r => r.leader))].sort(), [processedRows]);
      const statusesList = useMemo(() => ['All', ...new Set(processedRows.map(r => r.status))].sort(), [processedRows]);

      const openEditModal = (item) => {
        setEditingItem(item);
        setFormName(item.name);
        setFormId(item.empId === '—' ? '' : item.empId);
        setFormEmail(item.email === '—' ? '' : item.email);
        setFormLeader(item.leader === 'Unassigned' ? '' : item.leader);
        setFormPath(item.path);
        setFormStatus(item.status);
        setFormProgress(item.progress);
        setFormHireDate(item.hireDate ? item.hireDate.toISOString().split('T')[0] : '');
        setFormEnrollDate(item.enrollDate ? item.enrollDate.toISOString().split('T')[0] : '');
        setFormStartDate(item.startDate ? item.startDate.toISOString().split('T')[0] : '');
        setFormCompletionDate(item.completionDate ? item.completionDate.toISOString().split('T')[0] : '');
        setIsModalOpen(true);
      };

      const openAddModal = () => {
        setEditingItem(null);
        setFormName('');
        setFormId('');
        setFormEmail('');
        setFormLeader('');
        setFormPath('Lean Six Sigma White Belt');
        setFormStatus('Not yet started');
        setFormProgress(0);
        setFormHireDate('');
        setFormEnrollDate('');
        setFormStartDate('');
        setFormCompletionDate('');
        setIsModalOpen(true);
      };

      const handleFormSubmit = (e) => {
        e.preventDefault();
        const updatedRow = Array(77).fill(undefined);
        updatedRow[col.leader] = formLeader;
        updatedRow[col.name] = formName;
        updatedRow[col.empId] = formId;
        updatedRow[col.email] = formEmail;
        updatedRow[col.path] = formPath;
        updatedRow[col.hireDate] = formHireDate || null;
        updatedRow[col.status] = formStatus;
        updatedRow[col.progress] = Number(formProgress);
        updatedRow[col.enrollDate] = formEnrollDate || null;
        updatedRow[col.startDate] = formStartDate || null;
        updatedRow[col.completionDate] = formCompletionDate || null;

        const hcNameIndex = findColIndex(headers, "Full Legal Name", 31, 63);
        const hcLeaderIndex = findColIndex(headers, "Leader", 31, 63);
        const hcIdIndex = findColIndex(headers, "Employee ID", 31, 63);
        const hcStatusIndex = findColIndex(headers, "Status", 31, 63);
        const hcTribeIndex = findColIndex(headers, "Department/Tribe", 31, 63);

        updatedRow[hcNameIndex] = formName;
        updatedRow[hcLeaderIndex] = formLeader;
        updatedRow[hcIdIndex] = formId;
        updatedRow[hcStatusIndex] = "Active";
        updatedRow[hcTribeIndex] = "Logistics Operations";

        if (editingItem) {
          updateItem(editingItem.index_, updatedRow);
        }
        setIsModalOpen(false);
      };

      return (
        <div className="space-y-6 animate-fade-in">

              </div>

                <option value="All">All Leaders</option>
                {leadersList.filter(l => l !== 'All').map(l => <option key={l} value={l}>{l}</option>)}

              <select value={statusFilter} onChange={e => setStatusFilter(e.target.value)} className="bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-xs font-bold uppercase tracking-wider text-[#0f172a] outline-none focus:ring-2 focus:ring-[#91c13e] cursor-pointer">
                <option value="All">All Statuses</option>

    // VIEW 4 — IDEA PARTICIPATION
    function IdeaParticipation({ data }) {
      const [selectedYear, setSelectedYear] = useState('2026');
      const [selectedQuarter, setSelectedQuarter] = useState('All');
      const [searchQuery, setSearchQuery] = useState('');

      const headers = useMemo(() => data[0]?.row || [], [data]);

      const hcCol = useMemo(() => {
        return {
          leader: findColIndex(headers, "Leader", 31, 63),
          name: findColIndex(headers, "Full Legal Name", 31, 63),
        };
      }, [headers]);

      const opexCol = useMemo(() => {
        const idx = (str) => headers.findIndex(h => h?.toString().toLowerCase().includes(str.toLowerCase()));
        const exactIdx = (str) => headers.findIndex(h => h?.toString() === str);
        return {
          reporter: exactIdx("Reporter"),
          created: exactIdx("Created"),
          issueId: exactIdx("Issue id"),
          dept: exactIdx("Components"),
          summary: exactIdx("Summary"),
        };
      }, [headers]);

      const roster = useMemo(() => {
        if (data.length <= 1) return [];
        const map = new Map();
        data.slice(1).forEach(item => {
          const row = item.row;
          const name = safeVal(row, hcCol.name).trim();
          const leader = safeVal(row, hcCol.leader).trim() || 'Unassigned';
          if (name && name !== 'DUMMY ENTRY' && name !== '#N/A' && name !== '' && !String(name).startsWith('#')) {
            if (!map.has(name)) {
              map.set(name, { name, leader, cleaned: cleanName(name) });
            }
          }
        });
        return Array.from(map.values()).sort((a, b) => a.name.localeCompare(b.name));
      }, [data, hcCol]);

      const opexInitiatives = useMemo(() => {
        if (!headers.length) return [];
        return data.filter(item => {
          const row = item.row;
          if (row === headers) return false;
          const issueIdVal = row[opexCol.issueId];
          if (issueIdVal === undefined || issueIdVal === null || String(issueIdVal).trim() === '') {
            return false;
          }
          const deptVal = (row[opexCol.dept] || "").toString().trim();
          const VALID_DEPTS = ['se/kg - people services','manila - people service','na - people service','opex','se/kg - payroll','manila - na - people services'];
          const deptLower = deptVal.toLowerCase();
          if (!deptVal || !VALID_DEPTS.some(c => deptLower.includes(c) || c.includes(deptLower))) return false;
          return true;
        }).map(item => {
          const row = item.row;
          const createdDate = parseDateSafe(row[opexCol.created]);
          const reporter = safeVal(row, opexCol.reporter);
          const summary = safeVal(row, opexCol.summary);
          const mIdx = createdDate ? createdDate.getMonth() : null;
          const quarter = mIdx !== null ? Math.floor(mIdx / 3) + 1 : null;
          return {
            reporter,
            summary,
            createdDate,
            year: createdDate ? createdDate.getFullYear().toString() : 'Unknown',
            quarter: quarter ? 'Q' + quarter : 'Unknown',
          };
        });
      }, [data, opexCol, headers]);

      const participationRoster = useMemo(() => {
        return roster.map(person => {
          const matches = opexInitiatives.filter(init => {
            const reporterMatch = matchNames(person.name, init.reporter);
            const yearMatch = selectedYear === 'All' || init.year === selectedYear;
            const quarterMatch = selectedQuarter === 'All' || init.quarter === selectedQuarter;
            return reporterMatch && yearMatch && quarterMatch;
          });
          return {
            ...person,
            hasSubmitted: matches.length > 0,
            submissions: matches,
          };
        });
      }, [roster, opexInitiatives, selectedYear, selectedQuarter]);

      const stats = useMemo(() => {
        const total = participationRoster.length;
        const submitted = participationRoster.filter(p => p.hasSubmitted).length;
        const pct = total > 0 ? ((submitted / total) * 100).toFixed(1) : '0.0';
        return { total, submitted, pct };
      }, [participationRoster]);

      const filteredRoster = useMemo(() => {
        return participationRoster.filter(p => {
          const q = searchQuery.toLowerCase();
          const nameMatch = p.name.toLowerCase().includes(q);
          const leaderMatch = p.leader.toLowerCase().includes(q);
          return nameMatch || leaderMatch;
        });
      }, [participationRoster, searchQuery]);

      return (
        <div className="space-y-6 animate-fade-in">
          <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 flex flex-col lg:flex-row items-start lg:items-center justify-between gap-4">
            <div>
              <h1 className="text-2xl font-black text-[#062115] tracking-tight">Idea Participation</h1>
              <p className="text-xs text-slate-400 font-bold uppercase tracking-wider mt-1">One Idea Per Quarter</p>
            </div>
            <div className="flex flex-wrap items-center gap-3 w-full lg:w-auto">
              <div className="flex items-center gap-2">
                <span className="text-xs font-bold text-slate-500 uppercase tracking-wider">Year:</span>
                <select value={selectedYear} onChange={e => setSelectedYear(e.target.value)} className="bg-slate-50 border border-slate-200 rounded-xl px-4 py-2 text-xs font-bold uppercase tracking-wider text-slate-700 outline-none focus:ring-2 focus:ring-[#91c13e] cursor-pointer">
                  <option value="All">All Years</option>
                  <option value="2025">2025</option>
                  <option value="2026">2026</option>
                </select>
              </div>
              <div className="flex items-center gap-2">
                <span className="text-xs font-bold text-slate-500 uppercase tracking-wider">Quarter:</span>
                <select value={selectedQuarter} onChange={e => setSelectedQuarter(e.target.value)} className="bg-slate-50 border border-slate-200 rounded-xl px-4 py-2 text-xs font-bold uppercase tracking-wider text-slate-700 outline-none focus:ring-2 focus:ring-[#91c13e] cursor-pointer">
                  <option value="All">All Quarters</option>
                  <option value="Q1">Q1</option>
                  <option value="Q2">Q2</option>
                  <option value="Q3">Q3</option>
                  <option value="Q4">Q4</option>
                </select>
              </div>
              <div className="relative flex-1 lg:flex-none">
                <Icon name="Search" className="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" />
                <input type="text" placeholder="SEARCH ROSTER..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)} className="bg-slate-50 border border-slate-200 rounded-xl pl-10 pr-4 py-2.5 text-xs font-bold tracking-wider text-slate-700 placeholder-slate-400 uppercase outline-none focus:ring-2 focus:ring-[#91c13e] w-full lg:w-56" />
              </div>
            </div>
          </div>

          <div className="bg-[#062115] text-white rounded-2xl p-6 shadow-sm border border-emerald-950 flex flex-col md:flex-row items-center justify-between gap-4">
            <div className="space-y-1">
              <h2 className="text-lg font-black tracking-tight text-[#91c13e]">Idea Participation Standing</h2>
              <p className="text-xs text-gray-300 font-semibold max-w-xl"> Summary matching Headcount tracking list with OPEX CI contributions, stripping honorifics case-insensitively from both names. </p>
            </div>
            <div className="bg-emerald-950/50 border border-emerald-850/40 rounded-xl px-5 py-3 text-center md:text-right">
              <span className="text-[10px] text-emerald-400 font-bold uppercase tracking-widest block mb-0.5">Roster Summary</span>
              <div className="text-2xl font-black text-white font-mono">
                {stats.submitted + ' of ' + stats.total + ' submitted (' + stats.pct + '%)'}
              </div>
            </div>
          </div>

          <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
            <div className="px-6 py-5 border-b border-slate-100 flex items-center justify-between">
              <div>
                <h2 className="text-lg font-black text-[#062115] tracking-tight">Participation Directory</h2>
                <p className="text-xs text-slate-400 font-bold uppercase tracking-wider mt-1">Live Employee Campaign Standings</p>
              </div>
              <span className="bg-slate-50 text-slate-700 text-xs font-black uppercase tracking-wider px-3 py-1.5 rounded-xl font-mono">
                {filteredRoster.length} listed
              </span>
            </div>
            <div className="overflow-x-auto">
              <table className="w-full text-left border-collapse">
                <thead>
                  <tr className="border-b border-slate-100 bg-slate-50/50 text-slate-400 font-bold uppercase text-[10px] tracking-widest font-mono">
                    <th className="py-4 px-6">Staff Member</th>
                    <th className="py-4 px-4">Direct Supervisor</th>
                    <th className="py-4 px-4 text-center">Status</th>
                    <th className="py-4 px-6 text-right">Count of Ideas</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-slate-100 text-xs">
                  {filteredRoster.map(person => (
                    <tr key={person.name} className="hover:bg-slate-50/50 transition-colors duration-150">
                      <td className="py-4 px-6 font-bold text-slate-800">
                        <div className="flex items-center gap-2.5">
                          <div className="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center font-bold text-slate-600 uppercase text-xs shrink-0">
                            {person.name.substring(0, 2)}
                          </div>
                          <span className="font-extrabold text-slate-800 text-sm">{person.name}</span>
                        </div>
                      </td>
                      <td className="py-4 px-4 font-bold text-slate-700">{person.leader}</td>
                      <td className="py-4 px-4 text-center">
                        {person.hasSubmitted ? (
                          <span className="inline-flex items-center gap-1.5 px-3 py-1 bg-emerald-50 text-emerald-700 border border-emerald-200/60 rounded-full font-black uppercase text-[9px] tracking-widest">
                            <Icon name="CheckCircle" className="w-3.5 h-3.5 text-emerald-600" /> Submitted
                          </span>
                        ) : (
                          <span className="inline-flex items-center gap-1.5 px-3 py-1 bg-slate-50 text-slate-400 border border-slate-200/60 rounded-full font-black uppercase text-[9px] tracking-widest">
                            <Icon name="HelpCircle" className="w-3.5 h-3.5 text-slate-400" /> No Submission
                          </span>
                        )}
                      </td>
                      <td className="py-4 px-6 text-right font-black font-mono text-slate-800 text-sm">
                        {person.submissions.length}
                      </td>
                    </tr>
                  ))}
                  {filteredRoster.length === 0 && (
                    <tr>
                      <td colSpan={4} className="text-center py-12 text-slate-400 font-bold uppercase tracking-wider text-xs">
                        No matching personnel discovered in the active roster
                      </td>
                    </tr>
                  )}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    }

          <div className="flex items-center justify-between">
            <span className="text-[10px] text-slate-400 font-bold uppercase tracking-wider">{label}</span>
            <div className="p-1.5 rounded-lg bg-slate-50 text-slate-500">{icon}</div>
          </div>
          <div>
            <h3 className={'text-xl font-black tracking-tight ' + color}>{value}</h3>
            {formula && (
              <span className="text-[10px] text-slate-400 font-semibold block leading-tight mt-0.5">{formula}</span>
            )}
            {showProgress ? (
              <div className="mt-1.5 w-full bg-slate-100 h-1.5 rounded-full overflow-hidden">
                <div className={'h-full ' + progressColor} style={{ width: Math.min(progress, 100) + '%' }}></div>
              </div>
            ) : (
              sub && <p className="text-[10px] text-slate-400 font-semibold mt-0.5 truncate">{sub}</p>
            )}
            {secondarySub && (
              <p className="text-[9px] text-slate-400 font-bold uppercase mt-1 tracking-wide truncate">{secondarySub}</p>
            )}
          </div>
        </div>
      );
    }

    function MomentumD3Chart({ data }) {
      const svgRef = useRef(null);
      const containerRef = useRef(null);

      useEffect(() => {
        if (!svgRef.current || !containerRef.current) return;
        const margin = { top: 30, right: 30, bottom: 40, left: 45 };
        const width = Math.max(containerRef.current.clientWidth - margin.left - margin.right, 200);
        const height = 280 - margin.top - margin.bottom;

        const svg = d3.select(svgRef.current);
        svg.selectAll("*").remove();

        const g = svg.append("g")
          .attr("transform", "translate(" + margin.left + "," + margin.top + ")");

        const x = d3.scalePoint()
          .domain(data.map(d => d.month))
          .range([0, width]);

        const yMax = d3.max(data, d => Math.max(d.Submitted, d.Completed)) || 5;
        const y = d3.scaleLinear()
          .domain([0, yMax + 1])
          .range([height, 0]);

        g.append("g")
          .attr("class", "grid")
          .attr("stroke", "#f1f5f9")
          .attr("stroke-opacity", 0.6)
          .call(d3.axisLeft(y).ticks(5).tickSize(-width).tickFormat(""));

        g.append("g")
          .attr("transform", "translate(0," + height + ")")
          .call(d3.axisBottom(x).tickSize(0).tickPadding(10))
          .call(g => g.select(".domain").remove())
          .selectAll("text")
          .attr("fill", "#64748b")
          .style("font-size", "11px");

        g.append("g")
          .call(d3.axisLeft(y).ticks(5).tickSize(0).tickPadding(10))
          .call(g => g.select(".domain").remove())
          .selectAll("text")
          .attr("fill", "#64748b")
          .style("font-size", "11px");

        const lineSubmitted = d3.line()
          .x(d => x(d.month))
          .y(d => y(d.Submitted))
          .curve(d3.curveMonotoneX);

        const lineCompleted = d3.line()
          .x(d => x(d.month))
          .y(d => y(d.Completed))
          .curve(d3.curveMonotoneX);

        g.append("path")
          .datum(data)
          .attr("fill", "none")
          .attr("stroke", BAR_SUBMITTED_GRAY)
          .attr("stroke-width", 3)
          .attr("d", lineSubmitted);

        g.append("path")
          .datum(data)
          .attr("fill", "none")
          .attr("stroke", HF_GREEN)
          .attr("stroke-width", 3)
          .attr("d", lineCompleted);

        g.selectAll(".dot-sub")
          .data(data)
          .enter()
          .append("circle")
          .attr("cx", d => x(d.month))
          .attr("cy", d => y(d.Submitted))
          .attr("r", 4)
          .attr("fill", "#fff")
          .attr("stroke", BAR_SUBMITTED_GRAY)
          .attr("stroke-width", 2);

        g.selectAll(".dot-comp")
          .data(data)
          .enter()
          .append("circle")
          .attr("cx", d => x(d.month))
          .attr("cy", d => y(d.Completed))
          .attr("r", 4)
          .attr("fill", "#fff")
          .attr("stroke", HF_GREEN)
          .attr("stroke-width", 2);

        const handleResize = () => {
          if (!containerRef.current) return;
          const newWidth = Math.max(containerRef.current.clientWidth - margin.left - margin.right, 200);
          x.range([0, newWidth]);
          svg.selectAll("*").remove();

          const newG = svg.append("g")
            .attr("transform", "translate(" + margin.left + "," + margin.top + ")");

          newG.append("g")
            .attr("stroke", "#f1f5f9")
            .attr("stroke-opacity", 0.6)
            .call(d3.axisLeft(y).ticks(5).tickSize(-newWidth).tickFormat(""));

          newG.append("g")
            .attr("transform", "translate(0," + height + ")")
            .call(d3.axisBottom(x).tickSize(0).tickPadding(10))
            .call(g => g.select(".domain").remove())
            .selectAll("text")
            .attr("fill", "#64748b")
            .style("font-size", "11px");

          newG.append("g")
            .call(d3.axisLeft(y).ticks(5).tickSize(0).tickPadding(10))
            .call(g => g.select(".domain").remove())
            .selectAll("text")
            .attr("fill", "#64748b")
            .style("font-size", "11px");

          newG.append("path")
            .datum(data)
            .attr("fill", "none")
            .attr("stroke", BAR_SUBMITTED_GRAY)
            .attr("stroke-width", 3)
            .attr("d", lineSubmitted);

          newG.append("path")
            .datum(data)
            .attr("fill", "none")
            .attr("stroke", HF_GREEN)
            .attr("stroke-width", 3)
            .attr("d", lineCompleted);

          newG.selectAll(".dot-sub")
            .data(data)
            .enter()
            .append("circle")
            .attr("cx", d => x(d.month))
            .attr("cy", d => y(d.Submitted))
            .attr("r", 4)
            .attr("fill", "#fff")
            .attr("stroke", BAR_SUBMITTED_GRAY)
            .attr("stroke-width", 2);

          newG.selectAll(".dot-comp")
            .data(data)
            .enter()
            .append("circle")
            .attr("cx", d => x(d.month))
            .attr("cy", d => y(d.Completed))
            .attr("r", 4)
            .attr("fill", "#fff")
            .attr("stroke", HF_GREEN)
            .attr("stroke-width", 2);
        };

        window.addEventListener('resize', handleResize);
        return () => window.removeEventListener('resize', handleResize);
      }, [data]);

      return (
        <div ref={containerRef} className="w-full h-72">
          <svg ref={svgRef} className="w-full h-full overflow-visible" />
        </div>
      );
    }

    // Mount App
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
